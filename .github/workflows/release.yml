name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Derive version from tag
        shell: bash
        run: |
          echo "VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Build APKs
        run: ./gradlew assembleDebug assembleRelease

      - name: Sign release APK
        id: sign_release
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/*.apk dist/
          if [ -n "${{ steps.sign_release.outputs.signedReleaseFile }}" ]; then
            cp "${{ steps.sign_release.outputs.signedReleaseFile }}" dist/
          else
            cp app/build/outputs/apk/release/*.apk dist/
          fi
          (cd dist && sha256sum * > SHA256SUMS.txt)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
          body: |
            Version `${{ env.VERSION_NAME }}` built from tag `${{ github.ref_name }}`.
            The debug APK is always installable.
            The release APK is signed only when the Android signing secrets are configured.
